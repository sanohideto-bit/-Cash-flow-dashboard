<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工務店向け 資金繰りダッシュボード</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

    <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background-color: #94a3b8; }
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 selection:bg-blue-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, Legend, ResponsiveContainer, ReferenceLine, ComposedChart, Bar } = window.Recharts;

        const generateId = () => Math.random().toString(36).substring(2, 9);

        const generateMonthsList = (count) => {
          const months = [];
          const now = new Date();
          for (let i = 0; i < count; i++) {
            const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
            months.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
          }
          return months;
        };

        const calculateDate = (startMonthStr, offsetMonths, type) => {
          const [y, m] = startMonthStr.split('-');
          const day = type === 'income' ? 15 : 28;
          const d = new Date(Number(y), Number(m) - 1 + Number(offsetMonths), day);
          return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const INITIAL_TEMPLATES = [
          {
            id: 'tpl1',
            name: '木造住宅 標準モデル (工期7ヶ月)',
            items: [
              { id: generateId(), offset: 0, type: 'income', name: '契約金', ratio: 10 },
              { id: generateId(), offset: 0, type: 'expense', name: '設計・確認申請費等', ratio: 2 },
              { id: generateId(), offset: 1, type: 'expense', name: '地盤改良等 (外注)', ratio: 4 },
              { id: generateId(), offset: 2, type: 'income', name: '着工金', ratio: 30 },
              { id: generateId(), offset: 2, type: 'expense', name: '基礎工事 (外注)', ratio: 6 },
              { id: generateId(), offset: 3, type: 'income', name: '上棟金', ratio: 30 },
              { id: generateId(), offset: 3, type: 'expense', name: 'プレカット・サッシ等', ratio: 18 },
              { id: generateId(), offset: 4, type: 'expense', name: '造作・設備工事 (外注)', ratio: 14 },
              { id: generateId(), offset: 5, type: 'expense', name: '内装・外構工事 (外注)', ratio: 12 },
              { id: generateId(), offset: 6, type: 'income', name: '最終金', ratio: 30 },
              { id: generateId(), offset: 6, type: 'expense', name: '諸検査・残払い', ratio: 8 },
            ]
          }
        ];

        const INITIAL_DATA = {
          currentCash: 1200, 
          safetyLine: 800,
          templates: INITIAL_TEMPLATES,
          projects: [
            { id: 'p1', name: 'A様邸 新築工事', contractAmount: 2420, status: '施工中' },
            { id: 'p2', name: 'Bアパート 外壁改修', contractAmount: 880, status: '契約済' },
          ],
          transactions: [
            { id: 't1', projectId: 'p1', type: 'income', name: '着手金', amount: 726, date: '2026-03-15', status: '入金済' },
            { id: 't2', projectId: 'p1', type: 'expense', name: '基礎・躯体業者', amount: 500, date: '2026-04-30', status: '未支払' },
            { id: 't3', projectId: 'p1', type: 'expense', name: '木材仕入', amount: 600, date: '2026-05-31', status: '未支払' },
            { id: 't4', projectId: 'p1', type: 'income', name: '中間金', amount: 726, date: '2026-06-15', status: '未入金' },
            { id: 't7', projectId: 'p2', type: 'expense', name: '足場・資材', amount: 200, date: '2026-05-31', status: '未支払' },
            { id: 't8', projectId: 'p2', type: 'income', name: '着手金', amount: 300, date: '2026-05-15', status: '未入金' },
          ],
          fixedCosts: [
            { id: 'f1', name: '役員報酬・社員給与', amount: 150, type: 'monthly' },
            { id: 'f2', name: '事務所家賃・経費', amount: 50, type: 'monthly' },
            { id: 'f3', name: '銀行借入 元本返済', amount: 80, type: 'monthly' }, 
            { id: 'f4', name: '消費税・法人税 納付', amount: 1250, type: 'spot', month: '2026-05' }, 
          ]
        };

        const formatCurrency = (amount) => new Intl.NumberFormat('ja-JP').format(amount) + '万円';

        const ModalWrapper = ({ isOpen, onClose, title, children }) => {
          if (!isOpen) return null;
          return (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh] animate-in fade-in zoom-in-95 duration-200">
                <div className="flex justify-between items-center px-6 py-4 border-b border-slate-100 bg-slate-50 shrink-0">
                  <h2 className="text-lg font-bold text-slate-800">{title}</h2>
                  <button onClick={onClose} className="p-2 hover:bg-slate-200 rounded-full text-slate-500 transition-colors">
                    <i className="ph ph-x text-[20px]"></i>
                  </button>
                </div>
                <div className="p-6 overflow-y-auto custom-scrollbar">
                  {children}
                </div>
              </div>
            </div>
          );
        };

        function CashflowDashboard() {
          const [data, setData] = useState(INITIAL_DATA);
          const [forecastMonthsCount, setForecastMonthsCount] = useState(12); 
          const months = useMemo(() => generateMonthsList(forecastMonthsCount), [forecastMonthsCount]);
          
          const [expandedProjectId, setExpandedProjectId] = useState(null);
          const [modalType, setModalType] = useState(null);
          const [targetProjectId, setTargetProjectId] = useState(null);
          const [editingTransactionId, setEditingTransactionId] = useState(null);

          const inputClass = "w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow";

          const cashflowData = useMemo(() => {
            let runningBalance = data.currentCash;
            return months.map(month => {
              const income = data.transactions.filter(t => t.type === 'income' && t.date.startsWith(month) && t.status !== '入金済').reduce((sum, t) => sum + t.amount, 0);
              const expense = data.transactions.filter(t => t.type === 'expense' && t.date.startsWith(month) && t.status !== '支払済').reduce((sum, t) => sum + t.amount, 0);
              const fixedCost = data.fixedCosts.reduce((sum, f) => {
                if (f.type === 'monthly') return sum + f.amount;
                if (f.type === 'spot' && f.month === month) return sum + f.amount;
                return sum;
              }, 0);
              const totalOut = expense + fixedCost;
              runningBalance = runningBalance + income - totalOut;

              return {
                month, label: `${month.split('-')[1]}月`, fullLabel: `${month.replace('-', '年')}月`,
                '入金予定': income, '支払予定': totalOut, '月末予想残高': runningBalance,
                isDanger: runningBalance < 0, isWarning: runningBalance >= 0 && runningBalance < data.safetyLine
              };
            });
          }, [data, months]);

          const projectHealth = useMemo(() => {
            return data.projects.map(p => {
              const pTrans = data.transactions.filter(t => t.projectId === p.id);
              const receivedIncome = pTrans.filter(t => t.type === 'income' && t.status === '入金済').reduce((sum, t) => sum + t.amount, 0);
              const totalExpense = pTrans.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
              const expectedProfit = p.contractAmount - totalExpense;
              const profitMargin = p.contractAmount > 0 ? Math.round((expectedProfit / p.contractAmount) * 100) : 0;
              
              return {
                ...p, receivedIncome, totalExpense, expectedProfit, profitMargin,
                incomeProgress: Math.round((receivedIncome / p.contractAmount) * 100) || 0,
                transactions: pTrans.sort((a, b) => a.date.localeCompare(b.date))
              };
            });
          }, [data]);

          const minCashData = cashflowData.reduce((min, p) => p['月末予想残高'] < min['月末予想残高'] ? p : min, cashflowData[0] || { '月末予想残高': 0 });
          const totalContractVolume = projectHealth.reduce((sum, p) => sum + p.contractAmount, 0);
          const totalExpectedProfit = projectHealth.reduce((sum, p) => sum + p.expectedProfit, 0);
          const averageProfitMargin = totalContractVolume > 0 ? Math.round((totalExpectedProfit / totalContractVolume) * 100) : 0;

          const dangerMonths = cashflowData.filter(d => d.isDanger);

          const toggleTransactionStatus = (id, type, isChecked) => {
            setData(prev => ({ ...prev, transactions: prev.transactions.map(t => t.id === id ? { ...t, status: isChecked ? (type === 'income' ? '入金済' : '支払済') : (type === 'income' ? '未入金' : '未支払') } : t) }));
          };

          const deleteTransaction = (id) => setData(prev => ({ ...prev, transactions: prev.transactions.filter(t => t.id !== id) }));
          const deleteProject = (id) => setData(prev => ({ ...prev, projects: prev.projects.filter(p => p.id !== id), transactions: prev.transactions.filter(t => t.projectId !== id) }));
          const deleteFixedCost = (id) => setData(prev => ({ ...prev, fixedCosts: prev.fixedCosts.filter(f => f.id !== id) }));

          const CashForm = () => {
            const [cash, setCash] = useState(data.currentCash);
            const [safety, setSafety] = useState(data.safetyLine);
            const handleSubmit = (e) => { e.preventDefault(); setData(prev => ({ ...prev, currentCash: Number(cash), safetyLine: Number(safety) })); setModalType(null); };
            return (
              <form onSubmit={handleSubmit} className="space-y-5">
                <div><label className="block text-sm font-bold text-slate-700 mb-1">現在の現預金残高 (万円)</label><input type="number" value={cash} onChange={e => setCash(e.target.value)} className={inputClass} required /></div>
                <div><label className="block text-sm font-bold text-amber-700 mb-1">安全ライン (万円)</label><p className="text-xs text-slate-500 mb-2">※月商の1.5〜2ヶ月分を目安に設定してください。</p><input type="number" value={safety} onChange={e => setSafety(e.target.value)} className={inputClass} required /></div>
                <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700">設定を保存</button>
              </form>
            );
          };

          const ProjectForm = () => {
            const [name, setName] = useState('');
            const [amount, setAmount] = useState('');
            const [status, setStatus] = useState('見積中');
            const [useTemplate, setUseTemplate] = useState(false);
            const [templateId, setTemplateId] = useState(data.templates[0]?.id || '');
            const [startMonth, setStartMonth] = useState(months[0]);

            const handleSubmit = (e) => {
              e.preventDefault();
              const contractAmountNum = Number(amount);
              const newProjectId = generateId();
              const newProject = { id: newProjectId, name, contractAmount: contractAmountNum, status };
              let newTransactions = [];
              if (useTemplate) {
                const tpl = data.templates.find(t => t.id === templateId);
                if (tpl) {
                  newTransactions = tpl.items.map(item => ({
                    id: generateId(), projectId: newProjectId, type: item.type, name: item.name, 
                    amount: Math.round(contractAmountNum * (item.ratio / 100)), 
                    date: calculateDate(startMonth, item.offset, item.type), 
                    status: item.type === 'income' ? '未入金' : '未支払'
                  }));
                }
              }
              setData(prev => ({ ...prev, projects: [...prev.projects, newProject], transactions: [...prev.transactions, ...newTransactions] }));
              setModalType(null);
            };

            return (
              <form onSubmit={handleSubmit} className="space-y-5">
                <div><label className="block text-sm font-bold text-slate-700 mb-1">案件名・現場名</label><input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="例：D様邸 新築工事" className={inputClass} required /></div>
                <div><label className="block text-sm font-bold text-slate-700 mb-1">契約金額（税込・万円）</label><input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="例：2500" className={inputClass} required /></div>
                <div><label className="block text-sm font-bold text-slate-700 mb-1">ステータス</label>
                  <select value={status} onChange={e => setStatus(e.target.value)} className={inputClass}>
                    <option value="見積中">見積中</option><option value="契約済">契約済</option><option value="施工中">施工中</option>
                  </select>
                </div>
                <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 mt-6">
                  <label className="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" checked={useTemplate} onChange={e => setUseTemplate(e.target.checked)} className="w-5 h-5 text-blue-600 rounded" disabled={data.templates.length === 0} />
                    <span className="font-bold text-slate-800 flex items-center gap-2"><i className="ph ph-copy text-blue-500"></i> テンプレートから自動生成</span>
                  </label>
                  {useTemplate && data.templates.length > 0 && (
                    <div className="mt-4 space-y-4 pl-8">
                        <div>
                          <label className="block text-xs font-bold text-slate-600 mb-1">使用するテンプレート</label>
                          <select value={templateId} onChange={e => setTemplateId(e.target.value)} className={inputClass}>
                            {data.templates.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="block text-xs font-bold text-slate-600 mb-1">基準月 (契約・開始月)</label>
                          <input type="month" value={startMonth} onChange={e => setStartMonth(e.target.value)} className={inputClass} required />
                        </div>
                    </div>
                  )}
                  {useTemplate && data.templates.length === 0 && (
                     <p className="text-xs text-red-500 mt-2 pl-8">テンプレートが登録されていません。</p>
                  )}
                </div>
                <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700">案件を登録</button>
              </form>
            );
          };

          const TransactionForm = () => {
            const [projectId, setProjectId] = useState(targetProjectId || (data.projects[0]?.id || ''));
            const [type, setType] = useState('expense');
            const [name, setName] = useState('');
            const [amount, setAmount] = useState('');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            
            const handleSubmit = (e) => {
              e.preventDefault();
              setData(prev => ({ ...prev, transactions: [...prev.transactions, { id: generateId(), projectId, type, name, amount: Number(amount), date, status: type === 'income' ? '未入金' : '未支払' }] }));
              setModalType(null);
            };
            if(data.projects.length === 0) return <p className="text-red-500 text-sm">先に案件を登録してください。</p>;
            return (
              <form onSubmit={handleSubmit} className="space-y-4">
                <select value={projectId} onChange={e => setProjectId(e.target.value)} className={inputClass}>
                  {data.projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
                <div className="flex gap-4 bg-slate-50 p-3 rounded-lg border border-slate-200">
                  <label className="flex items-center gap-2 cursor-pointer"><input type="radio" checked={type === 'expense'} onChange={() => setType('expense')} /> <span className="text-sm font-bold text-rose-700">支払</span></label>
                  <label className="flex items-center gap-2 cursor-pointer"><input type="radio" checked={type === 'income'} onChange={() => setType('income')} /> <span className="text-sm font-bold text-emerald-700">入金</span></label>
                </div>
                <div><label className="block text-xs font-bold text-slate-700 mb-1">名目</label><input type="text" value={name} onChange={e => setName(e.target.value)} className={inputClass} required /></div>
                <div className="flex gap-4">
                  <div className="flex-1"><label className="block text-xs font-bold text-slate-700 mb-1">金額 (万円)</label><input type="number" value={amount} onChange={e => setAmount(e.target.value)} className={inputClass} required /></div>
                  <div className="flex-1"><label className="block text-xs font-bold text-slate-700 mb-1">予定日</label><input type="date" value={date} onChange={e => setDate(e.target.value)} className={inputClass} required /></div>
                </div>
                <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 mt-4">予定を追加</button>
              </form>
            );
          };

          const EditTransactionForm = () => {
            const tx = data.transactions.find(t => t.id === editingTransactionId);
            if (!tx) return null;

            const [name, setName] = useState(tx.name);
            const [amount, setAmount] = useState(tx.amount);
            const [date, setDate] = useState(tx.date);

            const handleSubmit = (e) => {
              e.preventDefault();
              setData(prev => ({
                ...prev,
                transactions: prev.transactions.map(t => t.id === tx.id ? { ...t, name, amount: Number(amount), date } : t)
              }));
              setModalType(null);
            };

            return (
              <form onSubmit={handleSubmit} className="space-y-4">
                <div className="bg-slate-50 p-3 rounded-lg border border-slate-200 mb-4">
                  <span className={`text-xs font-bold px-2 py-1 rounded ${tx.type === 'income' ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`}>
                    {tx.type === 'income' ? '入金 (売上)' : '支払 (原価)'}
                  </span>
                </div>
                <div><label className="block text-xs font-bold text-slate-700 mb-1">名目</label><input type="text" value={name} onChange={e => setName(e.target.value)} className={inputClass} required /></div>
                <div className="flex gap-4">
                  <div className="flex-1"><label className="block text-xs font-bold text-slate-700 mb-1">金額 (万円)</label><input type="number" value={amount} onChange={e => setAmount(e.target.value)} className={inputClass} required /></div>
                  <div className="flex-1"><label className="block text-xs font-bold text-slate-700 mb-1">予定日</label><input type="date" value={date} onChange={e => setDate(e.target.value)} className={inputClass} required /></div>
                </div>
                <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 mt-4">変更を保存</button>
              </form>
            );
          };

          const TemplateForm = () => {
            const [view, setView] = useState('list'); 
            const [editingTpl, setEditingTpl] = useState(null);

            const handleEdit = (tpl) => { setEditingTpl(JSON.parse(JSON.stringify(tpl))); setView('edit'); };
            const handleCreateNew = () => { setEditingTpl({ id: generateId(), name: '新規テンプレート', items: [] }); setView('edit'); };
            const deleteTemplate = (id) => { setData(prev => ({ ...prev, templates: prev.templates.filter(t => t.id !== id) })); };

            const saveTemplate = () => {
              setData(prev => {
                const exists = prev.templates.some(t => t.id === editingTpl.id);
                if (exists) return { ...prev, templates: prev.templates.map(t => t.id === editingTpl.id ? editingTpl : t) };
                return { ...prev, templates: [...prev.templates, editingTpl] };
              });
              setView('list');
            };

            const updateItem = (itemId, field, value) => {
              setEditingTpl(prev => ({
                ...prev, items: prev.items.map(item => item.id === itemId ? { ...item, [field]: value } : item)
              }));
            };
            const addItem = () => {
              setEditingTpl(prev => ({
                ...prev, items: [...prev.items, { id: generateId(), offset: 0, type: 'expense', name: '新規項目', ratio: 0 }]
              }));
            };
            const removeItem = (itemId) => {
              setEditingTpl(prev => ({ ...prev, items: prev.items.filter(item => item.id !== itemId) }));
            };

            if (view === 'list') {
              return (
                <div className="space-y-4">
                  <button onClick={handleCreateNew} className="w-full bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-700 flex justify-center items-center gap-2 mb-4">
                    <i className="ph-bold ph-plus"></i> 新規テンプレートを作成
                  </button>
                  {data.templates.length === 0 ? <p className="text-sm text-slate-500 text-center py-4">テンプレートがありません</p> : (
                    <div className="space-y-3">
                      {data.templates.map(tpl => (
                        <div key={tpl.id} className="bg-white border border-slate-200 p-4 rounded-xl flex justify-between items-center shadow-sm">
                          <div><p className="font-bold text-slate-800">{tpl.name}</p><p className="text-xs text-slate-500">{tpl.items.length} 項目</p></div>
                          <div className="flex gap-2">
                            <button onClick={() => handleEdit(tpl)} className="px-3 py-1.5 bg-blue-50 text-blue-600 text-xs font-bold rounded-lg hover:bg-blue-100">編集</button>
                            <button onClick={() => deleteTemplate(tpl.id)} className="px-3 py-1.5 bg-rose-50 text-rose-600 text-xs font-bold rounded-lg hover:bg-rose-100"><i className="ph ph-trash"></i></button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            }

            return (
              <div className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-slate-700 mb-1">テンプレート名</label>
                  <input type="text" value={editingTpl.name} onChange={e => setEditingTpl({...editingTpl, name: e.target.value})} className={inputClass} />
                </div>
                
                <div className="mt-6">
                  <div className="flex justify-between items-center mb-2">
                    <label className="text-xs font-bold text-slate-700">入出金項目 ({editingTpl.items.length}件)</label>
                    <button onClick={addItem} className="text-xs font-bold text-blue-600 hover:text-blue-800 flex items-center gap-1"><i className="ph-bold ph-plus"></i> 追加</button>
                  </div>
                  
                  <div className="space-y-2 max-h-64 overflow-y-auto custom-scrollbar pr-1">
                    {editingTpl.items.length === 0 ? <p className="text-xs text-slate-400 py-2">項目を追加してください</p> : editingTpl.items.map((item, index) => (
                      <div key={item.id} className="bg-slate-50 border border-slate-200 p-3 rounded-lg flex flex-col gap-2 relative group">
                        <button onClick={() => removeItem(item.id)} className="absolute top-2 right-2 text-slate-400 hover:text-red-500"><i className="ph ph-x"></i></button>
                        <div className="flex gap-2 pr-6">
                          <div className="flex-1">
                            <input type="text" value={item.name} onChange={e => updateItem(item.id, 'name', e.target.value)} placeholder="名目" className="w-full text-sm px-2 py-1.5 border border-slate-300 rounded focus:ring-1 focus:ring-blue-500 outline-none" />
                          </div>
                          <div className="w-24">
                            <select value={item.type} onChange={e => updateItem(item.id, 'type', e.target.value)} className="w-full text-sm px-2 py-1.5 border border-slate-300 rounded outline-none font-bold" style={{color: item.type === 'income' ? '#059669' : '#e11d48'}}>
                              <option value="income">入金</option>
                              <option value="expense">支払</option>
                            </select>
                          </div>
                        </div>
                        <div className="flex gap-2 items-center text-xs text-slate-600">
                          <span>基準月から</span>
                          <input type="number" min="0" value={item.offset} onChange={e => updateItem(item.id, 'offset', Number(e.target.value))} className="w-16 px-2 py-1 border border-slate-300 rounded text-center" />
                          <span>ヶ月後</span>
                          <span className="ml-2">割合:</span>
                          <input type="number" min="0" max="100" value={item.ratio} onChange={e => updateItem(item.id, 'ratio', Number(e.target.value))} className="w-16 px-2 py-1 border border-slate-300 rounded text-center" />
                          <span>%</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="flex gap-3 pt-4 border-t border-slate-100 mt-4">
                  <button onClick={() => setView('list')} className="flex-1 py-3 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200">キャンセル</button>
                  <button onClick={saveTemplate} className="flex-1 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700">保存して戻る</button>
                </div>
              </div>
            );
          };

          const FixedCostForm = () => {
            const [name, setName] = useState('');
            const [amount, setAmount] = useState('');
            const [type, setType] = useState('monthly');
            const [month, setMonth] = useState(months[0]);
            const handleAdd = (e) => {
              e.preventDefault();
              setData(prev => ({ ...prev, fixedCosts: [...prev.fixedCosts, { id: generateId(), name, amount: Number(amount), type, month: type === 'spot' ? month : undefined }] }));
              setName(''); setAmount('');
            };
            return (
              <div className="space-y-6">
                <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 max-h-48 overflow-y-auto shadow-inner custom-scrollbar">
                  {data.fixedCosts.map(f => (
                    <div key={f.id} className="flex justify-between items-center text-sm bg-white p-3 rounded-lg mb-2 shadow-sm border border-slate-100">
                      <div><span className="text-[10px] bg-slate-100 px-2 py-0.5 rounded mr-2">{f.type === 'monthly' ? '毎月' : f.month}</span><b>{f.name}</b></div>
                      <div className="flex items-center gap-4"><span>{f.amount}万</span><button onClick={() => deleteFixedCost(f.id)} className="text-slate-300 hover:text-red-500"><i className="ph ph-trash"></i></button></div>
                    </div>
                  ))}
                </div>
                <form onSubmit={handleAdd} className="space-y-4 pt-2">
                  <div className="flex gap-4"><label><input type="radio" checked={type === 'monthly'} onChange={() => setType('monthly')} /> 毎月</label><label><input type="radio" checked={type === 'spot'} onChange={() => setType('spot')} /> スポット</label></div>
                  <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="名称" className={inputClass} required />
                  <div className="flex gap-3"><input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="万円" className={inputClass} required />{type === 'spot' && <input type="month" value={month} onChange={e => setMonth(e.target.value)} className={inputClass} />}</div>
                  <button type="submit" className="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-700">追加する</button>
                </form>
              </div>
            );
          };

          return (
            <div className="p-4 md:p-8 font-sans">
              <header className="mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                  <h1 className="text-2xl md:text-3xl font-extrabold text-slate-900 flex items-center gap-3">
                    <div className="p-2 bg-blue-600 text-white rounded-xl shadow-sm"><i className="ph-fill ph-buildings text-[28px]"></i></div>
                    工務店 資金繰りダッシュボード
                  </h1>
                </div>
                <div className="flex gap-2">
                    <button onClick={() => setModalType('project')} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl font-bold shadow-sm transition-all flex items-center gap-2">
                      <i className="ph-bold ph-plus text-[18px]"></i> 新規案件
                    </button>
                    <button onClick={() => { setTargetProjectId(null); setModalType('transaction'); }} className="bg-white border border-slate-200 text-slate-700 px-4 py-2.5 rounded-xl font-bold shadow-sm hover:bg-slate-50 transition-all flex items-center gap-2">
                      <i className="ph-bold ph-currency-jpy text-[18px]"></i> 入出金追加
                    </button>
                    <button onClick={() => setModalType('fixedCost')} className="bg-white border border-slate-200 text-slate-700 px-4 py-2.5 rounded-xl font-bold shadow-sm hover:bg-slate-50 transition-all flex items-center gap-2">
                      <i className="ph-bold ph-calendar text-[18px]"></i> 固定費
                    </button>
                </div>
              </header>

              <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                 <div onClick={() => setModalType('cash')} className="bg-white px-6 py-5 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-5 cursor-pointer hover:border-blue-400 group transition-colors">
                  <div className="p-3 bg-blue-50 text-blue-600 rounded-xl group-hover:bg-blue-600 group-hover:text-white transition-colors"><i className="ph-fill ph-wallet text-[28px]"></i></div>
                  <div>
                    <p className="text-[11px] font-bold text-slate-400 uppercase tracking-widest">現在の現預金残高</p>
                    <p className="text-2xl font-black text-slate-900 tracking-tight">{formatCurrency(data.currentCash)}</p>
                  </div>
                </div>

                <div className={`bg-white px-6 py-5 rounded-2xl shadow-sm border ${minCashData['月末予想残高'] < 0 ? 'border-red-300 bg-red-50/50' : minCashData['月末予想残高'] < data.safetyLine ? 'border-amber-300 bg-amber-50/50' : 'border-slate-200'} flex items-center gap-5`}>
                  <div className={`p-3 rounded-xl ${minCashData['月末予想残高'] < 0 ? 'bg-red-100 text-red-600' : minCashData['月末予想残高'] < data.safetyLine ? 'bg-amber-100 text-amber-600' : 'bg-emerald-50 text-emerald-600'}`}>
                    <i className="ph-fill ph-trend-down text-[28px]"></i>
                  </div>
                  <div>
                    <p className="text-[11px] font-bold text-slate-400 uppercase tracking-widest">向こう{forecastMonthsCount}ヶ月の資金底予測 ({minCashData.fullLabel})</p>
                    <p className={`text-2xl font-black tracking-tight ${minCashData['月末予想残高'] < 0 ? 'text-red-600' : 'text-slate-900'}`}>{formatCurrency(minCashData['月末予想残高'])}</p>
                  </div>
                </div>

                <div className="bg-white px-6 py-5 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-5">
                  <div className={`p-3 rounded-xl ${averageProfitMargin >= 25 ? 'bg-emerald-50 text-emerald-600' : averageProfitMargin >= 15 ? 'bg-blue-50 text-blue-600' : 'bg-rose-50 text-rose-600'}`}>
                    <i className="ph-fill ph-chart-pie-slice text-[28px]"></i>
                  </div>
                  <div>
                    <p className="text-[11px] font-bold text-slate-400 uppercase tracking-widest">進行中案件 全体粗利率</p>
                    <div className="flex items-baseline gap-2">
                        <p className="text-2xl font-black text-slate-900 tracking-tight">{averageProfitMargin}<span className="text-lg">%</span></p>
                        <p className="text-xs font-bold text-slate-400">/ {formatCurrency(totalExpectedProfit)}</p>
                    </div>
                  </div>
                </div>
              </div>

              {dangerMonths.length > 0 && (
                <div className="mb-6 bg-red-50 border-l-4 border-red-500 p-5 rounded-r-2xl shadow-sm flex items-start gap-4 animate-in fade-in">
                  <i className="ph-fill ph-warning-circle text-[32px] text-red-600"></i>
                  <div>
                    <h3 className="font-bold text-red-800 text-lg">資金ショートの危険があります！</h3>
                    <div className="text-red-700 text-sm mt-2 space-y-1">
                        {dangerMonths.map(d => (
                            <p key={d.month}><strong>{d.fullLabel}</strong> に <strong className="text-red-900 text-base">{Math.abs(d['月末予想残高'])}万円</strong> の資金不足が発生する予測です。</p>
                        ))}
                    </div>
                    <p className="text-xs text-red-600 mt-3 font-bold">※金融機関への融資相談や、施主様への入金前倒し交渉、業者への支払い先延ばし交渉を検討してください。</p>
                  </div>
                </div>
              )}

              <div className="grid grid-cols-1 xl:grid-cols-12 gap-8">
                <div className="xl:col-span-8 bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                  <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                    <h2 className="text-xl font-bold flex items-center gap-2 text-slate-800"><i className="ph-bold ph-chart-line-up text-indigo-600"></i>資金繰り予測推移</h2>
                    <select value={forecastMonthsCount} onChange={(e) => setForecastMonthsCount(Number(e.target.value))} className="bg-white px-3 py-1.5 rounded-lg border border-slate-200 text-sm font-bold shadow-sm outline-none cursor-pointer">
                        <option value={6}>6ヶ月</option><option value={12}>1年</option><option value={24}>2年</option>
                    </select>
                  </div>
                  <div className="p-6 h-[450px]">
                    <ResponsiveContainer width="100%" height="100%">
                      <ComposedChart data={cashflowData} margin={{ top: 20, right: 20, bottom: 20, left: 20 }}>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                        <XAxis dataKey="fullLabel" tick={{fill: '#64748b', fontSize: 12}} dy={10} axisLine={false} tickLine={false} />
                        <YAxis tickFormatter={(val) => `${val}万`} tick={{fill: '#64748b', fontSize: 12}} axisLine={false} tickLine={false} dx={-10} />
                        <RechartsTooltip formatter={(v) => formatCurrency(v)} contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)' }} />
                        <ReferenceLine y={0} stroke="#ef4444" strokeWidth={2} strokeDasharray="4 4" />
                        <ReferenceLine y={data.safetyLine} stroke="#f59e0b" strokeWidth={1} strokeDasharray="4 4" />
                        <Bar dataKey="入金予定" barSize={20} fill="#34d399" radius={[4, 4, 0, 0]} />
                        <Bar dataKey="支払予定" barSize={20} fill="#fb7185" radius={[4, 4, 0, 0]} />
                        <Line type="monotone" dataKey="月末予想残高" stroke="#4f46e5" strokeWidth={4} dot={{ r: 4, fill: '#fff' }} />
                      </ComposedChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                <div className="xl:col-span-4 flex flex-col gap-6">
                  <div className="bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col flex-grow overflow-hidden">
                    <div className="p-5 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                        <h2 className="text-lg font-bold flex items-center gap-2 text-slate-800"><i className="ph-fill ph-helmet text-amber-500"></i> 現場別 粗利・進捗管理</h2>
                        <button onClick={() => setModalType('template')} className="text-[11px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded hover:bg-blue-100 flex items-center gap-1"><i className="ph-bold ph-copy"></i> テンプレート設定</button>
                    </div>
                    <div className="p-4 space-y-4 overflow-y-auto max-h-[500px] custom-scrollbar">
                      {projectHealth.map(p => (
                        <div key={p.id} className={`rounded-2xl border transition-all ${expandedProjectId === p.id ? 'border-indigo-300 ring-4 ring-indigo-50 shadow-md bg-white' : 'border-slate-200 hover:border-slate-300 bg-white'}`}>
                          <div className="p-5 cursor-pointer" onClick={() => setExpandedProjectId(expandedProjectId === p.id ? null : p.id)}>
                            <div className="flex justify-between items-start mb-2">
                                <div>
                                    <span className={`text-[10px] font-bold px-2 py-1 rounded ${p.status === '施工中' ? 'bg-blue-100 text-blue-700' : p.status === '契約済' ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-600'}`}>{p.status}</span>
                                    <h3 className="font-bold text-slate-800 mt-2">{p.name}</h3>
                                </div>
                                <div className="text-right flex flex-col items-end">
                                    <p className="font-black text-lg">{formatCurrency(p.contractAmount)}</p>
                                    <div className={`mt-1 px-2 py-0.5 rounded text-[10px] font-bold ${p.profitMargin < 20 ? 'bg-rose-100 text-rose-700' : p.profitMargin >= 30 ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-600'}`}>
                                        粗利率 {p.profitMargin}%
                                    </div>
                                </div>
                            </div>
                            {!expandedProjectId && (
                              <div className="flex gap-2 h-1.5 bg-slate-100 rounded-full overflow-hidden mt-3">
                                  <div className="bg-emerald-400" style={{ width: `${Math.min(p.incomeProgress, 100)}%` }}></div>
                              </div>
                            )}
                          </div>
                          {expandedProjectId === p.id && (
                            <div className="px-5 pb-5 border-t border-slate-100 bg-slate-50/50">
                                <div className="grid grid-cols-2 gap-4 py-4 mb-2">
                                    <div className="bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase">入金済額</p>
                                        <p className="font-black text-emerald-600 text-sm">{formatCurrency(p.receivedIncome)}</p>
                                    </div>
                                    <div className="bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase">総原価予測</p>
                                        <p className="font-black text-rose-600 text-sm">{formatCurrency(p.totalExpense)}</p>
                                    </div>
                                </div>
                                <div className="flex justify-between items-center mb-2">
                                  <h4 className="text-xs font-bold text-slate-500">入出金明細</h4>
                                  <button onClick={(e) => { e.stopPropagation(); setTargetProjectId(p.id); setModalType('transaction'); }} className="text-[10px] bg-white border border-slate-200 px-2 py-1 rounded font-bold text-slate-600 hover:bg-slate-100 shadow-sm"><i className="ph-bold ph-plus"></i> 追加</button>
                                </div>
                                <ul className="space-y-1.5 max-h-56 overflow-y-auto pr-1 custom-scrollbar">
                                    {p.transactions.map(t => (
                                        <li key={t.id} className="group flex justify-between items-center text-xs py-2 px-3 bg-white rounded-lg border border-slate-100 shadow-sm hover:border-slate-300 transition-colors">
                                            <div className="flex items-center gap-2 flex-1 overflow-hidden">
                                              <input type="checkbox" checked={t.status.includes('済')} onChange={(e) => toggleTransactionStatus(t.id, t.type, e.target.checked)} className="cursor-pointer w-4 h-4 rounded text-blue-600" />
                                              <span className={`truncate ${t.status.includes('済') ? 'line-through text-slate-400' : (t.type === 'income' ? 'font-bold text-emerald-700' : 'font-bold text-rose-700')}`}>{t.name}</span>
                                            </div>
                                            <div className="flex items-center gap-3 shrink-0">
                                              <span className={t.status.includes('済') ? 'text-slate-400 font-bold' : 'font-bold text-slate-700'}>{t.amount}万</span>
                                              <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                <button onClick={() => { setEditingTransactionId(t.id); setModalType('editTransaction'); }} className="p-1 text-slate-400 hover:text-blue-500 bg-slate-50 rounded"><i className="ph-bold ph-pencil-simple text-[14px]"></i></button>
                                                <button onClick={() => deleteTransaction(t.id)} className="p-1 text-slate-400 hover:text-red-500 bg-slate-50 rounded"><i className="ph-bold ph-trash text-[14px]"></i></button>
                                              </div>
                                            </div>
                                        </li>
                                    ))}
                                </ul>
                                <div className="mt-4 flex justify-between items-center border-t border-slate-200 pt-3">
                                  <div>
                                      <p className="text-[10px] font-bold text-slate-500">粗利予測額</p>
                                      <p className={`font-black text-base ${p.profitMargin < 20 ? 'text-rose-600' : 'text-slate-800'}`}>{formatCurrency(p.expectedProfit)}</p>
                                  </div>
                                  <button onClick={() => deleteProject(p.id)} className="text-[10px] font-bold text-slate-400 hover:text-red-500 transition-colors"><i className="ph ph-trash"></i> 案件ごと削除</button>
                                </div>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>

              <ModalWrapper isOpen={modalType === 'cash'} onClose={() => setModalType(null)} title="現預金と安全ラインの設定"><CashForm /></ModalWrapper>
              <ModalWrapper isOpen={modalType === 'project'} onClose={() => setModalType(null)} title="新規案件の登録"><ProjectForm /></ModalWrapper>
              <ModalWrapper isOpen={modalType === 'transaction'} onClose={() => setModalType(null)} title="入出金予定の追加"><TransactionForm /></ModalWrapper>
              <ModalWrapper isOpen={modalType === 'fixedCost'} onClose={() => setModalType(null)} title="固定費・スポット支出の設定"><FixedCostForm /></ModalWrapper>
              <ModalWrapper isOpen={modalType === 'template'} onClose={() => setModalType(null)} title="テンプレート管理"><TemplateForm /></ModalWrapper>
              <ModalWrapper isOpen={modalType === 'editTransaction'} onClose={() => setModalType(null)} title="明細の編集"><EditTransactionForm /></ModalWrapper>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CashflowDashboard />);
    </script>
</body>
</html>
