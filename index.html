<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資金繰り ダッシュボード</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- PropTypes -->
    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

    <!-- Recharts -->
    <script crossorigin src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background-color: #94a3b8; }
        
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 selection:bg-blue-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { 
          XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, ResponsiveContainer, ReferenceLine, ComposedChart, Bar, Line
        } = window.Recharts;

        const generateId = () => Math.random().toString(36).substring(2, 9);

        const generateMonthsList = (count) => {
          const months = [];
          const now = new Date();
          for (let i = 0; i < count; i++) {
            const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            months.push(`${year}-${month}`);
          }
          return months;
        };

        const calculateDate = (startMonthStr, offsetMonths, type) => {
          const [y, m] = startMonthStr.split('-');
          const day = type === 'income' ? 15 : 28;
          const d = new Date(Number(y), Number(m) - 1 + offsetMonths, day);
          return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const INITIAL_TEMPLATES = [
          {
            id: 'tpl1',
            name: '標準プロジェクト (7ヶ月)',
            items: [
              { id: 'i1', offset: 0, type: 'income', name: '契約金 (10%)', ratio: 0.10 },
              { id: 'i2', offset: 0, type: 'expense', name: '初期経費', ratio: 0.02 },
              { id: 'i3', offset: 2, type: 'income', name: '着工金 (30%)', ratio: 0.30 },
              { id: 'i4', offset: 2, type: 'expense', name: '基礎工事', ratio: 0.06 },
              { id: 'i5', offset: 3, type: 'income', name: '中間金 (30%)', ratio: 0.30 },
              { id: 'i6', offset: 6, type: 'income', name: '最終金 (30%)', ratio: 0.30 },
            ]
          }
        ];

        const INITIAL_DATA = {
          currentCash: 1200, 
          safetyLine: 800,   
          projects: [
            { id: 'p1', name: 'A様邸 新築工事', contractAmount: 2420, status: '施工中' },
          ],
          transactions: [
            { id: 't1', projectId: 'p1', type: 'income', name: '着手金', amount: 726, date: '2026-03-15', status: '入金済' },
            { id: 't2', projectId: 'p1', type: 'expense', name: '基礎・躯体業者', amount: 500, date: '2026-04-30', status: '未支払' },
          ],
          fixedCosts: [
            { id: 'f1', name: '給与・固定経費', amount: 200, type: 'monthly' },
            { id: 'f3', name: '借入返済', amount: 80, type: 'monthly' }, 
          ]
        };

        const formatCurrency = (amount) => new Intl.NumberFormat('ja-JP').format(amount) + '万円';

        const ModalWrapper = ({ isOpen, onClose, title, children }) => {
          if (!isOpen) return null;
          return (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh] animate-in fade-in zoom-in-95 duration-200">
                <div className="flex justify-between items-center px-6 py-4 border-b border-slate-100 bg-slate-50">
                  <h2 className="text-lg font-bold text-slate-800">{title}</h2>
                  <button onClick={onClose} className="p-2 hover:bg-slate-200 rounded-full text-slate-500 transition-colors">
                    <i className="ph ph-x text-[20px]"></i>
                  </button>
                </div>
                <div className="p-6 overflow-y-auto custom-scrollbar">
                  {children}
                </div>
              </div>
            </div>
          );
        };

        function CashflowDashboard() {
          const [data, setData] = useState(INITIAL_DATA);
          const [templates, setTemplates] = useState(INITIAL_TEMPLATES);
          const [forecastMonthsCount, setForecastMonthsCount] = useState(12);
          const months = useMemo(() => generateMonthsList(forecastMonthsCount), [forecastMonthsCount]);
          
          const [expandedProjectId, setExpandedProjectId] = useState(null);
          const [modalType, setModalType] = useState(null);
          const [targetProjectId, setTargetProjectId] = useState(null);
          const [editingTemplate, setEditingTemplate] = useState(null);

          const inputClass = "w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow";

          const cashflowData = useMemo(() => {
            let runningBalance = data.currentCash;
            return months.map(month => {
              const income = data.transactions
                .filter(t => t.type === 'income' && t.date.startsWith(month) && t.status !== '入金済')
                .reduce((sum, t) => sum + t.amount, 0);
              const expense = data.transactions
                .filter(t => t.type === 'expense' && t.date.startsWith(month) && t.status !== '支払済')
                .reduce((sum, t) => sum + t.amount, 0);
              const fixedCost = data.fixedCosts.reduce((sum, f) => {
                if (f.type === 'monthly') return sum + f.amount;
                if (f.type === 'spot' && f.month === month) return sum + f.amount;
                return sum;
              }, 0);
              const totalOut = expense + fixedCost;
              runningBalance = runningBalance + income - totalOut;
              return {
                month,
                label: `${month.split('-')[1]}月`,
                fullLabel: `${month.replace('-', '年')}月`,
                '入金予定': income,
                '支払予定': totalOut,
                '月末予想残高': runningBalance,
                isDanger: runningBalance < 0
              };
            });
          }, [data, months]);

          const projectHealth = useMemo(() => {
            return data.projects.map(p => {
              const pTrans = data.transactions.filter(t => t.projectId === p.id);
              const receivedIncome = pTrans.filter(t => t.type === 'income' && t.status === '入金済').reduce((sum, t) => sum + t.amount, 0);
              const totalExpense = pTrans.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
              const expectedProfit = p.contractAmount - totalExpense;
              return {
                ...p,
                receivedIncome, totalExpense, expectedProfit,
                incomeProgress: Math.round((receivedIncome / p.contractAmount) * 100) || 0,
                expenseProgress: Math.round((totalExpense / p.contractAmount) * 100) || 0,
                transactions: pTrans.sort((a, b) => a.date.localeCompare(b.date))
              };
            });
          }, [data]);

          const toggleTransactionStatus = (id, type, isChecked) => {
            setData(prev => ({
              ...prev, transactions: prev.transactions.map(t => t.id === id ? { ...t, status: isChecked ? (type === 'income' ? '入金済' : '支払済') : (type === 'income' ? '未入金' : '未支払') } : t)
            }));
          };

          const deleteTransaction = (id) => setData(prev => ({ ...prev, transactions: prev.transactions.filter(t => t.id !== id) }));
          const deleteProject = (id) => setData(prev => ({ ...prev, projects: prev.projects.filter(p => p.id !== id), transactions: prev.transactions.filter(t => t.projectId !== id) }));
          const deleteFixedCost = (id) => setData(prev => ({ ...prev, fixedCosts: prev.fixedCosts.filter(f => f.id !== id) }));

          const CashForm = () => {
            const [cash, setCash] = useState(data.currentCash);
            const [safety, setSafety] = useState(data.safetyLine);
            const handleSubmit = (e) => { e.preventDefault(); setData(prev => ({ ...prev, currentCash: Number(cash), safetyLine: Number(safety) })); setModalType(null); };
            return (
              <form onSubmit={handleSubmit} className="space-y-5">
                <div>
                  <label className="block text-sm font-bold text-slate-700 mb-1">現在の現預金残高 (万円)</label>
                  <input type="number" value={cash} onChange={e => setCash(e.target.value)} className={inputClass} required />
                </div>
                <div>
                  <label className="block text-sm font-bold text-amber-700 mb-1">安全ライン (万円)</label>
                  <input type="number" value={safety} onChange={e => setSafety(e.target.value)} className={inputClass} required />
                </div>
                <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700">設定を保存</button>
              </form>
            );
          };

          const ProjectForm = () => {
            const [name, setName] = useState('');
            const [amount, setAmount] = useState('');
            const [status, setStatus] = useState('契約済');
            const [useTemplate, setUseTemplate] = useState(false);
            const [templateId, setTemplateId] = useState(templates[0]?.id || '');
            const [startMonth, setStartMonth] = useState(months[0]);

            const handleSubmit = (e) => {
              e.preventDefault();
              const contractAmountNum = Number(amount);
              const newProjectId = generateId();
              const newProject = { id: newProjectId, name, contractAmount: contractAmountNum, status };
              let newTransactions = [];
              if (useTemplate) {
                const tpl = templates.find(t => t.id === templateId);
                if (tpl) {
                  newTransactions = tpl.items.map(item => ({
                    id: generateId(), projectId: newProjectId, type: item.type, name: item.name,
                    amount: Math.round(contractAmountNum * item.ratio),
                    date: calculateDate(startMonth, item.offset, item.type),
                    status: item.type === 'income' ? '未入金' : '未支払'
                  }));
                }
              }
              setData(prev => ({ ...prev, projects: [...prev.projects, newProject], transactions: [...prev.transactions, ...newTransactions] }));
              setModalType(null);
            };

            return (
              <form onSubmit={handleSubmit} className="space-y-5">
                <div>
                  <label className="block text-sm font-bold text-slate-700 mb-1">案件名・プロジェクト名</label>
                  <input type="text" value={name} onChange={e => setName(e.target.value)} className={inputClass} required />
                </div>
                <div>
                  <label className="block text-sm font-bold text-slate-700 mb-1">総額（万円）</label>
                  <input type="number" value={amount} onChange={e => setAmount(e.target.value)} className={inputClass} required />
                </div>
                <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                  <label className="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" checked={useTemplate} onChange={e => setUseTemplate(e.target.checked)} className="w-5 h-5" />
                    <span className="font-bold text-slate-800">テンプレートから予定を自動生成</span>
                  </label>
                  {useTemplate && templates.length > 0 && (
                    <div className="mt-4 space-y-4 pl-8">
                      <select value={templateId} onChange={e => setTemplateId(e.target.value)} className={inputClass}>
                        {templates.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                      </select>
                      <input type="month" value={startMonth} onChange={e => setStartMonth(e.target.value)} className={inputClass} />
                    </div>
                  )}
                  {useTemplate && templates.length === 0 && <p className="text-red-500 text-xs mt-2 pl-8">先にテンプレートを作成してください。</p>}
                </div>
                <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700">登録する</button>
              </form>
            );
          };

          const TransactionForm = () => {
            const [projectId, setProjectId] = useState(targetProjectId || (data.projects[0]?.id || ''));
            const [type, setType] = useState('expense');
            const [name, setName] = useState('');
            const [amount, setAmount] = useState('');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const handleSubmit = (e) => {
              e.preventDefault();
              const newTx = { id: generateId(), projectId, type, name, amount: Number(amount), date, status: type === 'income' ? '未入金' : '未支払' };
              setData(prev => ({ ...prev, transactions: [...prev.transactions, newTx] }));
              setModalType(null);
            };
            return (
              <form onSubmit={handleSubmit} className="space-y-4">
                <select value={projectId} onChange={e => setProjectId(e.target.value)} className={inputClass}>
                  {data.projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
                <div className="flex gap-4">
                  <button type="button" onClick={() => setType('expense')} className={`flex-1 py-2 rounded-lg font-bold border ${type === 'expense' ? 'bg-rose-100 border-rose-500 text-rose-700' : 'bg-white border-slate-200'}`}>支払</button>
                  <button type="button" onClick={() => setType('income')} className={`flex-1 py-2 rounded-lg font-bold border ${type === 'income' ? 'bg-emerald-100 border-emerald-500 text-emerald-700' : 'bg-white border-slate-200'}`}>入金</button>
                </div>
                <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="名目" className={inputClass} required />
                <div className="flex gap-4">
                  <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="金額" className={inputClass} required />
                  <input type="date" value={date} onChange={e => setDate(e.target.value)} className={inputClass} required />
                </div>
                <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">追加</button>
              </form>
            );
          };

          const TemplateManager = () => {
            const [tempTemplates, setTempTemplates] = useState([...templates]);
            const [editingId, setEditingId] = useState(null);

            const handleAddTemplate = () => {
              const newTpl = { id: generateId(), name: '新規テンプレート', items: [] };
              setTempTemplates([...tempTemplates, newTpl]);
              setEditingId(newTpl.id);
            };

            const handleUpdateTemplate = (id, field, value) => {
              setTempTemplates(tempTemplates.map(t => t.id === id ? { ...t, [field]: value } : t));
            };

            const handleDeleteTemplate = (id) => {
              setTempTemplates(tempTemplates.filter(t => t.id !== id));
              if (editingId === id) setEditingId(null);
            };

            const handleAddItem = (tplId) => {
              setTempTemplates(tempTemplates.map(t => t.id === tplId ? { ...t, items: [...t.items, { id: generateId(), offset: 0, type: 'income', name: '', ratio: 0 }] } : t));
            };

            const handleUpdateItem = (tplId, itemId, field, value) => {
              setTempTemplates(tempTemplates.map(t => t.id === tplId ? { ...t, items: t.items.map(i => i.id === itemId ? { ...i, [field]: value } : i) } : t));
            };

            const handleDeleteItem = (tplId, itemId) => {
              setTempTemplates(tempTemplates.map(t => t.id === tplId ? { ...t, items: t.items.filter(i => i.id !== itemId) } : t));
            };

            const handleSaveAll = () => {
              setTemplates(tempTemplates);
              setModalType(null);
            };

            const current = tempTemplates.find(t => t.id === editingId);

            return (
              <div className="space-y-6">
                <div className="flex justify-between items-center mb-4">
                  <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar">
                    {tempTemplates.map(t => (
                      <button key={t.id} onClick={() => setEditingId(t.id)} className={`px-4 py-2 rounded-lg text-sm font-bold whitespace-nowrap transition-colors ${editingId === t.id ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                        {t.name}
                      </button>
                    ))}
                    <button onClick={handleAddTemplate} className="px-4 py-2 rounded-lg bg-emerald-100 text-emerald-700 text-sm font-bold flex items-center gap-1"><i className="ph ph-plus"></i> 追加</button>
                  </div>
                </div>

                {current ? (
                  <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200 space-y-4">
                    <div className="flex justify-between items-start">
                      <div className="flex-1">
                        <label className="text-xs font-bold text-slate-400 mb-1 block uppercase">テンプレート名</label>
                        <input type="text" value={current.name} onChange={e => handleUpdateTemplate(current.id, 'name', e.target.value)} className={inputClass} />
                      </div>
                      <button onClick={() => handleDeleteTemplate(current.id)} className="ml-4 text-rose-500 hover:bg-rose-50 p-2 rounded-lg transition-colors mt-6"><i className="ph ph-trash text-xl"></i></button>
                    </div>

                    <div className="space-y-3">
                      <div className="flex justify-between items-center">
                        <h4 className="text-sm font-bold text-slate-600">発生ステップの設定</h4>
                        <button onClick={() => handleAddItem(current.id)} className="text-xs bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg font-bold">＋項目を追加</button>
                      </div>
                      <div className="space-y-2 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
                        {current.items.map(item => (
                          <div key={item.id} className="grid grid-cols-12 gap-2 bg-white p-3 rounded-xl border border-slate-200 items-center">
                            <select value={item.type} onChange={e => handleUpdateItem(current.id, item.id, 'type', e.target.value)} className="col-span-3 border border-slate-300 rounded p-1 text-xs">
                              <option value="income">入金</option>
                              <option value="expense">支払</option>
                            </select>
                            <input type="text" value={item.name} onChange={e => handleUpdateItem(current.id, item.id, 'name', e.target.value)} placeholder="項目名" className="col-span-4 border border-slate-300 rounded p-1 text-xs" />
                            <div className="col-span-2">
                              <input type="number" value={item.offset} onChange={e => handleUpdateItem(current.id, item.id, 'offset', Number(e.target.value))} className="w-full border border-slate-300 rounded p-1 text-xs text-center" />
                              <p className="text-[8px] text-center text-slate-400">ヶ月後</p>
                            </div>
                            <div className="col-span-2">
                              <input type="number" step="0.01" value={item.ratio} onChange={e => handleUpdateItem(current.id, item.id, 'ratio', Number(e.target.value))} className="w-full border border-slate-300 rounded p-1 text-xs text-center" />
                              <p className="text-[8px] text-center text-slate-400">割合(0-1)</p>
                            </div>
                            <button onClick={() => handleDeleteItem(current.id, item.id)} className="col-span-1 text-slate-300 hover:text-rose-500"><i className="ph ph-x"></i></button>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="text-center py-10 text-slate-400 italic bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
                    テンプレートを選択または新規作成してください
                  </div>
                )}
                <button onClick={handleSaveAll} className="w-full bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-700 mt-4 shadow-lg">設定を確定する</button>
              </div>
            );
          };

          return (
            <div className="p-4 md:p-8">
              <header className="mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                  <h1 className="text-2xl md:text-3xl font-extrabold text-slate-900 flex items-center gap-3">
                    <div className="p-2 bg-indigo-600 text-white rounded-xl"><i className="ph-fill ph-chart-line text-[28px]"></i></div>
                    資金繰り ダッシュボード
                  </h1>
                </div>
                <div onClick={() => setModalType('cash')} className="bg-white px-6 py-4 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-5 cursor-pointer hover:border-indigo-400 transition-all">
                  <div className="p-3 bg-indigo-50 text-indigo-600 rounded-xl"><i className="ph-fill ph-wallet text-[28px]"></i></div>
                  <div>
                    <p className="text-[11px] font-bold text-slate-400 uppercase tracking-widest">現在の現預金残高</p>
                    <p className="text-3xl font-black text-slate-900">{formatCurrency(data.currentCash)}</p>
                  </div>
                </div>
              </header>

              <div className="grid grid-cols-1 xl:grid-cols-12 gap-8">
                <div className="xl:col-span-8 bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                  <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                    <h2 className="text-xl font-bold flex items-center gap-2 text-slate-800"><i className="ph-bold ph-trend-up text-indigo-600"></i>資金繰り予測</h2>
                    <select value={forecastMonthsCount} onChange={(e) => setForecastMonthsCount(Number(e.target.value))} className="bg-white border border-slate-200 rounded-lg px-3 py-1 text-sm font-bold text-slate-600">
                      <option value={6}>6ヶ月</option><option value={12}>12ヶ月</option><option value={24}>24ヶ月</option>
                    </select>
                  </div>
                  <div className="p-6 flex-grow">
                    <div className="w-full h-[400px]">
                      <ResponsiveContainer width="100%" height="100%">
                        <ComposedChart data={cashflowData} margin={{ top: 10, right: 10, bottom: 10, left: 10 }}>
                          <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                          <XAxis dataKey="label" tickLine={false} axisLine={false} tick={{fill: '#64748b', fontSize: 12}} />
                          <YAxis tickFormatter={(val) => `${val}万`} tickLine={false} axisLine={false} tick={{fill: '#64748b', fontSize: 12}} />
                          <RechartsTooltip formatter={(v) => formatCurrency(v)} contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)' }} />
                          <ReferenceLine y={0} stroke="#ef4444" strokeWidth={2} />
                          <ReferenceLine y={data.safetyLine} stroke="#f59e0b" strokeDasharray="4 4" label={{ value: '安全ライン', fill: '#f59e0b', fontSize: 10 }} />
                          <Bar dataKey="入金予定" fill="#10b981" radius={[4, 4, 0, 0]} />
                          <Bar dataKey="支払予定" fill="#f43f5e" radius={[4, 4, 0, 0]} />
                          <Line type="monotone" dataKey="月末予想残高" stroke="#4f46e5" strokeWidth={4} dot={{ r: 4, fill: '#fff', strokeWidth: 2 }} />
                        </ComposedChart>
                      </ResponsiveContainer>
                    </div>
                  </div>
                </div>

                <div className="xl:col-span-4 flex flex-col gap-6">
                  <div className="grid grid-cols-1 gap-3">
                    <button onClick={() => setModalType('project')} className="bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow hover:bg-indigo-700 transition-colors flex items-center justify-center gap-2"><i className="ph ph-plus-circle text-xl"></i>案件を登録</button>
                    <button onClick={() => setModalType('template')} className="bg-white border border-slate-200 p-4 rounded-2xl font-bold shadow-sm hover:bg-slate-50 transition-colors flex items-center justify-center gap-2 text-slate-700"><i className="ph ph-squares-four text-xl text-indigo-500"></i>テンプレート設定</button>
                  </div>

                  <div className="bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col flex-grow overflow-hidden max-h-[500px]">
                    <div className="p-5 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                      <h2 className="text-lg font-bold flex items-center gap-2 text-slate-800"><i className="ph-fill ph-projector-screen text-amber-500"></i>進行中の案件</h2>
                    </div>
                    <div className="p-4 space-y-4 overflow-y-auto custom-scrollbar">
                      {projectHealth.map(p => (
                        <div key={p.id} className="rounded-2xl border border-slate-200 p-4 hover:border-indigo-300 transition-all cursor-pointer" onClick={() => setExpandedProjectId(expandedProjectId === p.id ? null : p.id)}>
                          <div className="flex justify-between items-start mb-2">
                            <h3 className="font-bold text-slate-800">{p.name}</h3>
                            <span className="font-black text-slate-900">{formatCurrency(p.contractAmount)}</span>
                          </div>
                          <div className="flex gap-2">
                            <div className="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden"><div className="bg-emerald-500 h-full" style={{ width: `${p.incomeProgress}%` }}></div></div>
                            <div className="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden"><div className="bg-rose-400 h-full" style={{ width: `${p.expenseProgress}%` }}></div></div>
                          </div>
                          {expandedProjectId === p.id && (
                            <div className="mt-4 pt-4 border-t border-slate-100 space-y-2">
                              <div className="flex justify-between text-xs text-slate-500 font-bold mb-2 uppercase"><span>入金・支払明細</span><button onClick={(e) => { e.stopPropagation(); setTargetProjectId(p.id); setModalType('transaction'); }} className="text-indigo-600">＋追加</button></div>
                              {p.transactions.map(t => (
                                <div key={t.id} className="flex justify-between items-center text-[10px] bg-slate-50 p-2 rounded-lg">
                                  <label className="flex items-center gap-2">
                                    <input type="checkbox" checked={t.status.includes('済')} onChange={(e) => toggleTransactionStatus(t.id, t.type, e.target.checked)} onClick={e => e.stopPropagation()} />
                                    <span className={t.status.includes('済') ? 'line-through text-slate-400' : 'font-bold'}>{t.name}</span>
                                  </label>
                                  <span className={`font-bold ${t.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}`}>{t.amount}万</span>
                                </div>
                              ))}
                              <button onClick={(e) => { e.stopPropagation(); deleteProject(p.id); }} className="w-full text-center text-rose-400 text-[10px] font-bold mt-2">案件を削除</button>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>

              <ModalWrapper isOpen={modalType === 'cash'} onClose={() => setModalType(null)} title="基本設定"><CashForm /></ModalWrapper>
              <ModalWrapper isOpen={modalType === 'project'} onClose={() => setModalType(null)} title="新規案件登録"><ProjectForm /></ModalWrapper>
              <ModalWrapper isOpen={modalType === 'transaction'} onClose={() => setModalType(null)} title="予定追加"><TransactionForm /></ModalWrapper>
              <ModalWrapper isOpen={modalType === 'template'} onClose={() => setModalType(null)} title="テンプレート管理"><TemplateManager /></ModalWrapper>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CashflowDashboard />);
    </script>
</body>
</html>
